<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Menu — Aroma Lunchroom</title>
<meta name="robots" content="noindex" />
<link rel="icon" href="project/assets/logo-3.png" type="image/png" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
@font-face { font-family:"Kingthings Clarity"; src:url("project/assets/Kingthings Clarity1.1.ttf") format("truetype"); font-display:swap; }
:root {
  --bg: #f6efe1;
  --bg-2: #ece0c5;
  --ink: #1c1a14;
  --ink-2: #4a4636;
  --ink-3: #7a7460;
  --line: #d9cdb2;
  --brand: #3f7d38;
  --brand-ink: #f6efe1;
  --serif: "Kingthings Clarity","Fraunces",Georgia,serif;
  --sans: "Manrope",system-ui,sans-serif;
}
*, *::before, *::after { box-sizing: border-box; }
html, body { margin: 0; padding: 0; height: 100%; }
body {
  background: var(--bg);
  color: var(--ink);
  font-family: var(--sans);
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 32px 24px 48px;
  -webkit-font-smoothing: antialiased;
}

/* Logo */
.logo-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
  margin-bottom: 40px;
}
.logo-circle {
  width: 72px;
  height: 72px;
  background: var(--brand);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
}
.logo-circle img {
  width: 44px;
  height: 44px;
  object-fit: contain;
  filter: brightness(0) invert(1);
}
.logo-name {
  font-family: var(--serif);
  font-size: 26px;
  color: var(--ink);
  letter-spacing: 0.02em;
}

/* Welcome block */
.welcome {
  text-align: center;
  max-width: 360px;
  margin-bottom: 44px;
}
.eyebrow {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--ink-3);
  display: block;
  margin-bottom: 14px;
}
.welcome h1 {
  font-family: var(--serif);
  font-weight: 400;
  font-size: clamp(26px, 6vw, 34px);
  line-height: 1.1;
  margin: 0 0 16px;
  color: var(--ink);
}
.welcome p {
  font-size: 14px;
  line-height: 1.65;
  color: var(--ink-2);
  margin: 0;
}

/* Language buttons */
.lang-options {
  display: flex;
  flex-direction: column;
  gap: 14px;
  width: 100%;
  max-width: 320px;
}
.lang-option {
  display: flex;
  align-items: center;
  gap: 16px;
  background: #fff;
  border: 1.5px solid var(--line);
  border-radius: 14px;
  padding: 18px 22px;
  cursor: pointer;
  text-decoration: none;
  color: var(--ink);
  font-family: var(--sans);
  transition: border-color 0.15s, box-shadow 0.15s, background 0.15s;
  -webkit-tap-highlight-color: transparent;
}
.lang-option:hover, .lang-option:focus-visible {
  border-color: var(--brand);
  box-shadow: 0 0 0 3px rgba(63,125,56,0.12);
  background: #fafff9;
  outline: none;
}
.lang-option:active {
  background: var(--bg-2);
}
.lang-flag {
  font-size: 28px;
  line-height: 1;
  flex-shrink: 0;
}
.lang-text {
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.lang-name {
  font-size: 16px;
  font-weight: 700;
  color: var(--ink);
  line-height: 1.2;
}
.lang-sub {
  font-size: 12px;
  color: var(--ink-3);
  line-height: 1.3;
}
.lang-arrow {
  margin-left: auto;
  color: var(--brand);
  font-size: 18px;
  flex-shrink: 0;
}

/* Footer */
.scan-footer {
  margin-top: 44px;
  text-align: center;
  font-size: 12px;
  color: var(--ink-3);
  line-height: 1.6;
}
.scan-footer a {
  color: var(--ink-3);
  text-decoration: none;
  border-bottom: 1px solid var(--line);
}
</style>
</head>
<body>

<div class="logo-wrap">
  <div class="logo-circle">
    <img src="project/assets/logo-3.png" alt="Aroma" />
  </div>
  <span class="logo-name">Aroma</span>
</div>

<div class="welcome">
  <span class="eyebrow">Gorinchem · Arkelstraat 33</span>
  <h1>Welcome to<br>Aroma Lunchroom</h1>
  <p>Greek breakfast, homemade lunch &amp; specialty coffee. Choose your language to view our menu.</p>
</div>

<div class="lang-options">

  <button class="lang-option" onclick="choose('nl')">
    <span class="lang-flag">🇳🇱</span>
    <span class="lang-text">
      <span class="lang-name">Nederlands</span>
      <span class="lang-sub">Bekijk het menu in het Nederlands</span>
    </span>
    <span class="lang-arrow">→</span>
  </button>

  <button class="lang-option" onclick="choose('en')">
    <span class="lang-flag">🇬🇧</span>
    <span class="lang-text">
      <span class="lang-name">English</span>
      <span class="lang-sub">View the menu in English</span>
    </span>
    <span class="lang-arrow">→</span>
  </button>

  <button class="lang-option" onclick="choose('de')">
    <span class="lang-flag">🇩🇪</span>
    <span class="lang-text">
      <span class="lang-name">Deutsch</span>
      <span class="lang-sub">Speisekarte auf Deutsch anzeigen</span>
    </span>
    <span class="lang-arrow">→</span>
  </button>

</div>

<p class="scan-footer">
  Arkelstraat 33 · Gorinchem<br>
  Ma–Za 08:00–17:00 · <a href="mailto:info@aromalunchroom.com">info@aromalunchroom.com</a>
</p>

<script>
function choose(lang) {
  try { localStorage.setItem('aroma_lang', lang); } catch(e) {}
  window.location.href = 'menu.html';
}
</script>

</body>
</html>
